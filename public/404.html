<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pokemon Collection</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Encodes the path and query into a query string on index.html
      // so the SPA can restore the correct route on load.
      var pathSegmentsToKeep = 1; // keep repo name prefix
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .split('/')
            .slice(1 + pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
